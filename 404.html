<!--
============================================================================
404.HTML - DR. SAMEH ELTAYBANI - PAGE NOT FOUND
============================================================================
Custom error page with friendly message and the same 8 featured navigation
cards from the Home page. The navigation bar does not highlight any tab.
Breadcrumb: Home > Page Not Found (Home links to index.html).
============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== BASE PATH ===== -->
  <base href="/website/">
  <meta name="site-base-path" content="/website/">

  <!-- PAGE-SPECIFIC -->
  <title>Dr. Sameh Eltaybani - Page Not Found</title>
  <meta name="description" content="The page you are looking for could not be found. Return to the homepage or explore other sections of Dr. Sameh Eltaybani's website.">
  <meta property="og:title" content="Dr. Sameh Eltaybani - Page Not Found">
  <meta property="og:description" content="The page you are looking for could not be found. Return to the homepage or explore other sections.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="404.html">

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- MAIN CSS -->
  <link rel="stylesheet" href="assets/css/main.css">


    <!--
Background image (immediately before the closing HEAD tag
-->

<style>
  body {
    background: linear-gradient(rgba(255,255,255,0.90), rgba(255,255,255,0.90)), url('assets/img/david-edelstein-N4DbvTUDikw-unsplash.jpg') fixed;
    background-size: cover;
    background-position: center;
  }
</style>


</head>
<body data-page="404.html">

  <!-- ========== NAVIGATION BAR ========== -->
  <nav data-component="navigation" class="navbar">
    <div class="navbar-container">
        <div class="navbar-left"></div>
        <div class="navbar-right"></div>
        
      <!-- Search icon (always visible, never cleared by navigation.js) -->
        
      <button id="search-toggle" class="search-icon-btn" aria-label="Search">
            <i class="fas fa-search"></i>
        </button>
        <button class="hamburger" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
      
    </div>
</nav>

  <!-- ========== BREADCRUMB BAR (exact height) ========== -->
  <div data-component="breadcrumb" class="breadcrumb-bar"
       style="height: var(--breadcrumb-height); display: flex; align-items: center; box-sizing: border-box;"></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main>
    <!-- Friendly error message -->
    <section class="section">
      <div class="container" style="text-align: center;">
        <h1 class="heading-large" style="font-size: 3rem;">404</h1>
        <h2 class="heading-medium">Page Not Found</h2>
        <p class="paragraph" style="max-width: 500px; margin-left: auto; margin-right: auto;">
          Sorry, the page you are looking for does not exist or has been moved.
          You can return to the homepage or explore one of the sections below.
        </p>
        <a href="index.html" class="btn btn-primary" style="margin-bottom: var(--space-xl);">
          <i class="fas fa-home mr-sm"></i> Back to Home
        </a>
      </div>
    </section>

    <!-- PART 3: FEATURED NAVIGATION CARDS (8 cards, same as Home page) -->
    <section class="section-alt">
      <div class="container">
        <h2 class="heading-medium text-center mb-lg">Explore the Site</h2>
        <div id="featured-cards-container" class="featured-cards-grid">
          <!-- Cards will be inserted here by JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer data-component="footer"></footer>

  <!-- ========== SCRIPTS (EXACT ORDER) ========== -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/breadcrumbs.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/search.js"></script>

  <!-- PAGE-SPECIFIC SCRIPTS: featured cards -->
  <script>
    (function() {
      'use strict';

      // ------------------------------------------------------------------
      // FEATURED NAVIGATION CARDS (exactly the same as Home page)
      // ------------------------------------------------------------------

      const featuredCardsData = [
    {
      title: 'Research',
      icon: 'fas fa-brain',
      description: 'Discover my research interests, ongoing projects, and external resources.',
      link: 'research.html'
    },
    {
      title: 'Publications',
      icon: 'fas fa-file-alt',
      description: 'Browse my published work with links to PubMed, journal sites, and personal insights.',
      link: 'publications.html'
    },
    {
      title: 'Data Analysis',
      icon: 'fas fa-chart-bar',
      description: 'Translating raw data into actionable clinical insights.',
      link: 'data-analysis.html'
    },
    {
      title: 'Teaching',
      icon: 'fas fa-chalkboard-teacher',
      description: 'Explore my courses, teaching philosophy, and educational materials.',
      link: 'teaching.html'
    },
    {
      title: 'Portfolios',
      icon: 'fas fa-briefcase',
      isPortfolio: true,
      bulletPoints: [
        'Research Portfolio',
        'Teaching Portfolio',
        'Data Analysis Portfolio'
      ],
      link: 'portfolios.html'
    },
    {
      title: 'Blog',
      icon: 'fas fa-blog',
      description: 'Read my articles on healthcare, research integrity, data analysis, and more.',
      link: 'blog.html'
    },
    {
      title: 'Contact',
      icon: 'fas fa-envelope',
      description: 'I am always happy to communicate, collaborate, or answer questions.',
      link: 'contact.html'
    },
    {
      title: 'Newsletter',
      icon: 'fas fa-newspaper',
      description: 'Stay updated with my latest insights and academic news.',
      link: 'newsletter.html'
    },
    {
      title: 'Legal',
      icon: 'fas fa-balance-scale',
      description: 'Read the legal disclaimer and privacy policy.',
      link: 'legal.html'
    }
];



      function createFeaturedCard(cardData) {
    // Create an <a> that wraps the entire card, making it fully clickable
    const cardLink = document.createElement('a');
    cardLink.href = cardData.link;
    cardLink.className = 'card card-lift';
    cardLink.style.textDecoration = 'none';
    cardLink.style.color = 'inherit';
    cardLink.style.display = 'block';

    const content = document.createElement('div');
    content.className = 'card-content';

    // ---- Title with optional icon ----
    const titleEl = document.createElement('h3');
    titleEl.className = 'card-title';

        if (cardData.icon) {
        const icon = document.createElement('i');
        icon.className = cardData.icon + ' fa-fw';
        icon.style.marginRight = '0.5rem';
        icon.style.fontSize = '1.5rem';
        icon.style.backgroundColor = 'var(--color-gold-light)';
        icon.style.display = 'inline-flex';
        icon.style.alignItems = 'center';
        icon.style.justifyContent = 'center';
        icon.style.width = '2.5rem';
        icon.style.height = '2.5rem';
        icon.style.borderRadius = '50%';
        icon.style.color = 'var(--color-midnight-blue)';
        titleEl.appendChild(icon);
    }
        
    titleEl.appendChild(document.createTextNode(cardData.title));
    // ---------------------------------

    content.appendChild(titleEl);

    if (cardData.isPortfolio) {
        const bulletList = document.createElement('ul');
        bulletList.className = 'card-bullet-list';
        cardData.bulletPoints.forEach(point => {
            const li = document.createElement('li');
            li.textContent = point;
            bulletList.appendChild(li);
        });
        content.appendChild(bulletList);
    } else {
        const desc = document.createElement('p');
        desc.className = 'card-description';
        desc.textContent = cardData.description;
        content.appendChild(desc);
    }

    const buttonText = document.createElement('span');
    buttonText.className = 'btn btn-text';
    buttonText.textContent = 'Go to section ❯';
    content.appendChild(buttonText);

    cardLink.appendChild(content);
    return cardLink;
}

      


      function renderFeaturedCards() {
        const container = document.getElementById('featured-cards-container');
        if (!container) return;
        container.innerHTML = '';
        featuredCardsData.forEach(data => {
          container.appendChild(createFeaturedCard(data));
        });
      }

      // Initialisation
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderFeaturedCards);
      } else {
        renderFeaturedCards();
      }
    })();
  </script>
</body>
</html>
