<!--
============================================================================
CONTACT.HTML - DR. SAMEH ELTAYBANI - CONTACT PAGE
============================================================================
Page‑specific content:
  - Friendly introductory statement
  - Button that opens the user's email client
  - The email address is assembled from fragments in JavaScript to avoid spam
All standard components (nav, breadcrumb, footer) are present.
===========================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== BASE PATH ===== -->
  <base href="/website/">
  <meta name="site-base-path" content="/website/">

  <!-- PAGE-SPECIFIC -->
  <title>Dr. Sameh Eltaybani - Contact</title>
  <meta name="description" content="Get in touch with Dr. Sameh Eltaybani for collaborations, speaking engagements, or general inquiries.">
  <meta property="og:title" content="Dr. Sameh Eltaybani - Contact">
  <meta property="og:description" content="Get in touch with Dr. Sameh Eltaybani for collaborations, speaking engagements, or general inquiries.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="contact.html">

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- MAIN CSS -->
  <link rel="stylesheet" href="assets/css/main.css">

 

</head>
<body data-page="contact.html">

  <!-- ========== NAVIGATION BAR ========== -->
  <nav data-component="navigation" class="navbar">
    <div class="navbar-container">
        <div class="navbar-left"></div>
        <div class="navbar-right"></div>
        <!-- Search icon (always visible, never cleared by navigation.js) -->
        <button id="search-toggle" class="search-icon-btn" aria-label="Search">
            <i class="fas fa-search"></i>
        </button>
        <button class="hamburger" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>
  
  <!-- ========== BREADCRUMB BAR (exact height) ========== -->
  <div data-component="breadcrumb" class="breadcrumb-bar"
       style="height: var(--breadcrumb-height); display: flex; align-items: center; box-sizing: border-box;"></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main>
    <section class="section">
      <div class="container" style="max-width: 700px; margin: 0 auto; text-align: center;">
        <h1 class="heading-large">Contact</h1>
        <p class="paragraph">
          I am always happy to communicate about research collaborations, teaching opportunities,
          data analysis projects, or any other academic inquiry. You can email me directly, or
          use the form below — both will reach me promptly.
        </p>

        <!-- The button's href will be set by JavaScript to protect the email address -->
        <a id="contact-email-btn" class="btn btn-primary" style="font-size: var(--font-size-lg); padding: var(--space-md) var(--space-xl);">
          <i class="fas fa-envelope mr-sm"></i> Send me an email
        </a>

        <!-- Contact form (Formspree) -->
<div style="max-width: 500px; margin: var(--space-xl) auto 0 auto; text-align: left;">
  <form action="https://formspree.io/f/mojzldnp" method="POST">

    <!-- Name -->
    <div class="form-group">
      <label class="form-label" for="contact-name">Your Name</label>
      <input type="text" id="contact-name" name="name" class="form-input" placeholder="How should I address you?" required>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="contact-email">Your Email</label>
      <input type="email" id="contact-email" name="email" class="form-input" placeholder="So I can reply to you" required>
    </div>

    <!-- Message -->
    <div class="form-group">
      <label class="form-label" for="contact-message">Your Message</label>
      <textarea id="contact-message" name="message" class="form-textarea" rows="5" placeholder="What would you like to discuss?" required></textarea>
    </div>

    <!-- Submit button -->
    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
  </form>
</div>



        
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer data-component="footer"></footer>

  <!-- ========== SCRIPTS (EXACT ORDER) ========== -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/breadcrumbs.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/search.js"></script>

  <!-- PAGE-SPECIFIC SCRIPT: assemble email and set the button link -->
  <script>
    (function() {
      'use strict';

      // ------------------------------------------------------------------
      // EMAIL ASSEMBLY (fragmented to avoid spam harvesting)
      // ------------------------------------------------------------------
      // TO CHANGE THE EMAIL: just edit the three parts below.
      // The final address will be: part1 + "@" + part2 + "." + part3
      const emailPart1 = 'sameh.eltaybani';   // everything before "@"
      const emailPart2 = 'nursing';            // domain name (e.g., "gmail", "nursing")
      const emailPart3 = 'edu.eg';             // top-level domain (e.g., "com", "edu.eg")

      const fullEmail = emailPart1 + '@' + emailPart2 + '.' + emailPart3;

      // Set the button's href to open the user's email client
      const emailBtn = document.getElementById('contact-email-btn');
      if (emailBtn) {
        emailBtn.href = 'mailto:' + fullEmail;
      }
    })();
  </script>
</body>
</html>
