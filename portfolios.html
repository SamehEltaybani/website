<!--
============================================================================
PORTFOLIOS.HTML - DR. SAMEH ELTAYBANI - PORTFOLIOS MAIN PAGE
============================================================================
Page‑specific content:
  - Three clickable portfolio cards (Research, Teaching, Data Analysis)
  - Each card drives from /json/portfolio-list.json
  - Cards link to the respective individual portfolio pages
  - Breadcrumb: Home > Portfolios
  - Navigation highlights "Portfolios"
All amendments integrated (base path, breadcrumb height, left‑aligned, etc.)
============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== BASE PATH ===== -->
  <base href="/website/">
  <meta name="site-base-path" content="/website/">

  <!-- PAGE-SPECIFIC -->
  <title>Dr. Sameh Eltaybani - Portfolios</title>
  <meta name="description" content="Explore Dr. Sameh Eltaybani's professional portfolios: Research, Teaching, and Data Analysis.">
  <meta property="og:title" content="Dr. Sameh Eltaybani - Portfolios">
  <meta property="og:description" content="Explore Dr. Sameh Eltaybani's professional portfolios: Research, Teaching, and Data Analysis.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="portfolios.html">

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- MAIN CSS -->
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="portfolios.html">

  <!-- ========== NAVIGATION BAR ========== -->
  <nav data-component="navigation" class="navbar">
    <div class="navbar-container">
      <div class="navbar-left"></div>
      <div class="navbar-right"></div>
      <button class="hamburger" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- ========== BREADCRUMB BAR (exact height) ========== -->
  <div data-component="breadcrumb" class="breadcrumb-bar"
       style="height: var(--breadcrumb-height); display: flex; align-items: center; box-sizing: border-box;"></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main>
    <section class="section">
      <div class="container">
        <h1 class="heading-large">Portfolios</h1>
        <p class="paragraph">
          A curated overview of my professional work across three key domains.
        </p>

        <!-- Portfolio cards (rendered by JavaScript) -->
        <div id="portfolio-cards-container" class="grid-3" style="gap: var(--space-lg);">
          <!-- Cards will be inserted here -->
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer data-component="footer"></footer>

  <!-- ========== SCRIPTS (EXACT ORDER) ========== -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/breadcrumbs.js"></script>
  <script src="assets/js/footer.js"></script>

  <!-- PAGE-SPECIFIC SCRIPTS -->
  <script>
    (function() {
      'use strict';

      // ------------------------------------------------------------------
      // A. HELPERS
      // ------------------------------------------------------------------
      function escapeHTML(text) {
        if (typeof SiteUtils !== 'undefined' && SiteUtils.escapeHTML) {
          return SiteUtils.escapeHTML(text);
        }
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // ------------------------------------------------------------------
      // B. PORTFOLIO DATA MAPPING
      // ------------------------------------------------------------------
      // Maps portfolio names from JSON to their respective page URLs
      const portfolioPageMap = {
        'Research Portfolio': 'research-portfolio.html',
        'Teaching Portfolio': 'teaching-portfolio.html',
        'Data Analysis Portfolio': 'data-analysis-portfolio.html'
      };

      // ------------------------------------------------------------------
      // C. LOAD & RENDER PORTFOLIO CARDS
      // ------------------------------------------------------------------
      async function renderPortfolioCards() {
        const container = document.getElementById('portfolio-cards-container');
        if (!container) return;

        try {
          const data = await SiteUtils.loadJSON('/json/portfolio-list.json', true);
          if (!data || !Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-center text-muted">No portfolios found.</p>';
            return;
          }

          container.innerHTML = '';   // clear loading area

          data.forEach(item => {
            const name = item.portfolioname || 'Untitled Portfolio';
            const description = item.description || '';
            const pageUrl = portfolioPageMap[name] || '#';   // fallback if unknown

            // Create an <a> that wraps the entire card (card-lift)
            const cardLink = document.createElement('a');
            cardLink.href = pageUrl;
            cardLink.className = 'card card-lift';
            cardLink.style.textDecoration = 'none';
            cardLink.style.color = 'inherit';
            cardLink.style.display = 'block';  // ensure it behaves like a block

            // Card content
            cardLink.innerHTML = `
              <div class="card-content">
                <h3 class="card-title">${escapeHTML(name)}</h3>
                <p class="card-description">${escapeHTML(description)}</p>
                <span class="btn btn-text" style="margin-top: var(--space-sm); margin-left: auto; display: block; text-align: right;">Explore →</span>
              </div>
            `;

            container.appendChild(cardLink);
          });
        } catch (error) {
          console.error('[Portfolios] Failed to load portfolio-list.json:', error);
          container.innerHTML = '<p class="text-center text-muted">Unable to load portfolio data. Please try again later.</p>';
        }
      }

      // ------------------------------------------------------------------
      // D. INITIALISATION
      // ------------------------------------------------------------------
      async function initPortfolios() {
        if (typeof SiteUtils !== 'undefined' && SiteUtils.waitForDOM) {
          await SiteUtils.waitForDOM();
        }
        await renderPortfolioCards();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPortfolios);
      } else {
        initPortfolios();
      }
    })();
  </script>
</body>
</html>
