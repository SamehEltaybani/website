                          // Build suggestion pool from all publication entries
                          
      
function buildSuggestionPool() {
    if (suggestionPool.length > 0) return;
    const freqMap = new Map();
    const processField = (text) => {
        if (text && typeof SiteUtils.cleanSearchTerm === 'function') {
            const words = SiteUtils.cleanSearchTerm(text);
            words.forEach(w => freqMap.set(w, (freqMap.get(w) || 0) + 1));
            for (let i = 0; i < words.length - 1; i++) {
                const bigram = words[i] + ' ' + words[i+1];
                freqMap.set(bigram, (freqMap.get(bigram) || 0) + 1);
            }
        }
    };
    state.allItems.forEach(pub => {
        processField(pub.title);
        processField(pub.summary);
    });
    suggestionPool = [...freqMap.entries()].sort((a, b) => b[1] - a[1]).map(e => e[0]);
}

      function handleAutocomplete() {

    if (query.length === 0) {

    let spellSugg = [];

        spellSugg = findSpellSuggestions(query, suggestionPool);
    }
    showAutocomplete(directMatches, spellSugg);
}

     // ------- Spell‑correction helpers -------
function editDistance(a, b) {
    const alen = a.length, blen = b.length;
    const dp = Array.from({ length: alen + 1 }, () => Array(blen + 1).fill(0));
    for (let i = 0; i <= alen; i++) dp[i][0] = i;
    for (let j = 0; j <= blen; j++) dp[0][j] = j;
    for (let i = 1; i <= alen; i++) {
        for (let j = 1; j <= blen; j++) {
            dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]) + 1;
        }
    }
    return dp[alen][blen];
}

function findSpellSuggestions(query, pool) {
    if (!query || query.length < 3) return [];
    const q = query.toLowerCase().trim();
    const maxDist = 2;
    let best = [];
    for (const word of pool) {
        const dist = editDistance(q, word);
        if (dist <= maxDist) {
            best.push({ word, dist });
        }
    }
    best.sort((a, b) => a.dist - b.dist || a.word.localeCompare(b.word));
    return best.slice(0, 8).map(item => item.word);
}

      async function loadPublications() {
        try {
          if (typeof SiteUtils === 'undefined') throw new Error('utils.js not loaded');
          const data = await SiteUtils.loadJSON('/json/publication-list.json', true);
          if (!data || !Array.isArray(data) || data.length === 0) {
            showEmptyState('No content available. Check back later.');
            return;
          }
          state.allItems = data;
          allYears = [...new Set(data.map(p => p.year))].filter(Boolean).sort();
          allJournals = [...new Set(data.map(p => p.journal))].filter(Boolean).sort();
          buildSuggestionPool(); 
          populateFilterDropdowns();
          applyAllFilters();
        } catch (e) {
          console.error(e);
          showEmptyState('No content available. Check back later.');
        }
      }

      function applyAllFilters() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        let items = [...state.allItems];


if (state.activeSearch) {
    const rawQuery = state.activeSearch.toLowerCase().trim();
    const searchWords = (typeof SiteUtils.cleanSearchTerm === 'function')
        ? SiteUtils.cleanSearchTerm(state.activeSearch)
        : rawQuery.split(/\s+/).filter(w => w.length > 0);
    const finalWords = searchWords.length > 0 ? searchWords : [rawQuery];

    items = items.filter(pub => {
        const haystack = [
            pub.title,
            pub.summary
        ].join(' ').toLowerCase().replace(/[^\w\s-]/g, '');

        return finalWords.every(word => {
            if (haystack.includes(word)) return true;
            if (typeof SiteUtils.stem === 'function') {
                const stemmedWord = SiteUtils.stem(word);
                if (stemmedWord !== word && haystack.includes(stemmedWord)) return true;
            }
            return false;
        });
    });
}

        
        
        if (state.activeFilters.year) items = items.filter(p => p.year == state.activeFilters.year);
        if (state.activeFilters.authorship) items = items.filter(p => p.authorship === state.activeFilters.authorship);
        if (state.activeFilters.journal) items = items.filter(p => p.journal === state.activeFilters.journal);

        const { field, direction } = state.activeSort;
        if (field === 'year') {
          items.sort((a, b) => ((parseInt(b.year)||0) - (parseInt(a.year)||0)) * (direction === 'desc' ? 1 : -1));
        } else if (field === 'authorship') {
          items.sort((a, b) => {
            if (a.authorship === 'First/Corresponding author' && b.authorship !== 'First/Corresponding author') return -1;
            if (a.authorship !== 'First/Corresponding author' && b.authorship === 'First/Corresponding author') return 1;
            return 0;
          });
        }

        state.filteredItems = items;
        state.currentPage = 1;
        hideLoadMoreButton();
        renderCurrentPage();
        updateControlHighlights();
      }

        closeSortDropdown();
        filterDropdown.classList.toggle('hidden');
      });
      sortBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeFilterDropdown();
        sortDropdown.classList.toggle('hidden');
      });
      document.addEventListener('click', (event) => {
        if (!filterDropdown.contains(event.target) && event.target !== filterBtn && !filterBtn.contains(event.target)) closeFilterDropdown();
        if (!sortDropdown.contains(event.target) && event.target !== sortBtn && !sortBtn.contains(event.target)) closeSortDropdown();
      });

      applyFiltersBtn.addEventListener('click', handleFilterApply);
      sortDropdown.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-sort]');
        if (btn) handleSortOption(btn.dataset.sort);
      });

      // ------------------------------------------------------------------
      // RENDER
      // ------------------------------------------------------------------
function renderCurrentPage() {
    if (!publicationsContainer) return;
    const end = state.currentPage * state.itemsPerPage;
    const itemsToShow = state.filteredItems.slice(0, end);

    let html = '';
    itemsToShow.forEach((pub, i) => {
        const authorClass = pub.authorship === 'First/Corresponding author' ? 'authorship-first' : 'authorship-coauthor';
        const authorTag = pub.authorship ? `<div class="publication-authorship ${authorClass}">${escapeHTML(pub.authorship)}</div>` : '';

        let btns = '';
        if (pub.pubmedLink) btns += `<a href="${escapeHTML(pub.pubmedLink)}" class="btn btn-text" target="_blank" rel="noopener" style="white-space: nowrap; padding: var(--space-xs) var(--space-sm); font-size: var(--font-size-sm);"><i class="fas fa-external-link-alt mr-xs"></i>PubMed &gt;&gt;</a>`;
        if (pub.journalLink) btns += `<a href="${escapeHTML(pub.journalLink)}" class="btn btn-text" target="_blank" rel="noopener" style="white-space: nowrap; padding: var(--space-xs) var(--space-sm); font-size: var(--font-size-sm);"><i class="fas fa-book-open mr-xs"></i>Journal &gt;&gt;</a>`;
        if (pub.blogLink) btns += `<a href="${escapeHTML(pub.blogLink)}" class="btn btn-text" style="white-space: nowrap; padding: var(--space-xs) var(--space-sm); font-size: var(--font-size-sm);"><i class="fas fa-lightbulb mr-xs"></i>My insights &gt;&gt;</a>`;

        // Determine alternating row class based on global index
        const globalIndex = (state.currentPage - 1) * state.itemsPerPage + i;
        const rowClass = globalIndex % 2 === 0 ? 'row-even' : 'row-odd';

        html += `
            <div class="publication-item ${rowClass}" style="margin-bottom: 0;">
              <div class="publication-header">
                <div style="flex: 1;">
                  ${authorTag}
                  <div class="publication-title" style="margin-top: 2px;">${escapeHTML(pub.title)}</div>
                </div>
                <div class="publication-year">${escapeHTML(pub.year)}</div>
              </div>
              <div class="publication-journal">${escapeHTML(pub.journal || '')}</div>
              ${btns ? `<div class="publication-buttons" style="flex-wrap: nowrap; gap: var(--space-xs);">${btns}</div>` : ''}
            </div>
        `;

        if ((i + 1) % state.itemsPerPage === 0 && (i + 1) < itemsToShow.length) {
            const pageNumber = Math.ceil((i + 1) / state.itemsPerPage);
            html += `<div class="page-separator">
                <span class="page-sep-label">&#x25B2; PAGE ${pageNumber}</span>
                <div class="page-sep-line"></div>
                <span class="page-sep-label">&#x25BC; PAGE ${pageNumber + 1}</span>
            </div>`;
        }
    });

    publicationsContainer.innerHTML = html;

    // Update result-count bar
    const countBar = document.getElementById('results-count-bar');
    if (countBar) {
        const totalItems = state.filteredItems.length;
        const shownItems = Math.min(state.currentPage * state.itemsPerPage, totalItems);
        const totalPages = Math.max(1, Math.ceil(totalItems / state.itemsPerPage));
        const pageWord = state.currentPage === 1 ? 'page' : 'pages';

        countBar.innerHTML =
            '<span>Showing <span style="color:var(--color-midnight-blue); font-weight:600;">' + shownItems + '</span> of <span style="color:var(--color-midnight-blue); font-weight:600;">' + totalItems + '</span> publications</span>' +
            ' <span>( <span style="color:var(--color-midnight-blue); font-weight:600;">' + state.currentPage + '</span> ' + pageWord + ' of <span style="color:var(--color-midnight-blue); font-weight:600;">' + totalPages + '</span> )</span>';
    }

    // Load More button visibility
    if (state.filteredItems.length > end) {
        loadMoreBtn.classList.remove('hidden');
        if (isLoadingMore) {
            loadMoreBtn.disabled = true;
            loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-sm"></i>Loading...';
        } else {
            loadMoreBtn.disabled = false;
            loadMoreBtn.textContent = 'Load More';
        }
    } else {
        hideLoadMoreButton();
    }
}


      

      function hideLoadMoreButton() { if (loadMoreBtn) loadMoreBtn.classList.add('hidden'); }

      loadMoreBtn.addEventListener('click', async () => {
        if (isLoadingMore || loadMoreBtn.disabled) return;
        isLoadingMore = true;
        loadMoreBtn.disabled = true;
        loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-sm"></i>Loading...';
        await new Promise(r => setTimeout(r, 100));
        state.currentPage++;
        isLoadingMore = false;
        renderCurrentPage();
      });

      // ------------------------------------------------------------------
      // EVENT LISTENERS
      // ------------------------------------------------------------------
      const debouncedSearch = (typeof SiteUtils !== 'undefined' && SiteUtils.debounce) ? SiteUtils.debounce(handleSearchInput, 300) : handleSearchInput;
      searchInput.addEventListener('input', function(e) {
        debouncedSearch();
        handleAutocomplete();
      });
      resetBtn.addEventListener('click', handleReset);

      // ------------------------------------------------------------------
      // INIT
      // ------------------------------------------------------------------
            async function initPubs() {
    if (typeof SiteUtils !== 'undefined' && SiteUtils.waitForDOM) await SiteUtils.waitForDOM();
    await loadPublications();

    // ---- Auto‑filter if coming from search results ----
    const urlParams = new URLSearchParams(window.location.search);
    const searchParam = urlParams.get('search');
    if (searchParam && searchInput) {
        // Reset all active filters and sort to defaults
        state.activeFilters = { year: null, authorship: null, journal: null };
        state.activeSort    = { field: 'year', direction: 'desc' };

        // Also reset the filter‑dropdowns on screen
        const filterYear = document.getElementById('filter-year');
        const filterAuthor = document.getElementById('filter-authorship');
        const filterJournal = document.getElementById('filter-journal');
        if (filterYear) filterYear.value = '';
        if (filterAuthor) filterAuthor.value = '';
        if (filterJournal) filterJournal.value = '';

        // Now apply the search term
        searchInput.value = searchParam;
        handleSearchInput();                 // triggers applyAllFilters with fresh state
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    // -------------------------------------------------

    updateActiveSortUI();
    updateControlHighlights();
}

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPubs);
      else initPubs();
    })();
  </script>
