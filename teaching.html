<!--
============================================================================
TEACHING.HTML - DR. SAMEH ELTAYBANI - TEACHING PAGE
============================================================================
Differences from Research page:
  - Top section: grid of short sentences (insights) instead of external buttons
  - Feature button 2 links to teaching-portfolio.html
  - Featured cards use analysisCards array and container id="analysis-cards-container"
  - Page metadata updated
============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <base href="/website/">
  <meta name="site-base-path" content="/website/">

  <title>Dr. Sameh Eltaybani - Teaching</title>
  <meta name="description" content="Explore Dr. Sameh Eltaybani's teaching philosophy, courses, and educational resources. Empowering the next generation of healthcare professionals.">
  <meta property="og:title" content="Dr. Sameh Eltaybani - Teaching">
  <meta property="og:description" content="Explore Dr. Sameh Eltaybani's teaching philosophy, courses, and educational resources.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="teaching.html">

  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="teaching.html">

  <nav data-component="navigation" class="navbar">
    <div class="navbar-container">
      <div class="navbar-left"></div>
      <div class="navbar-right"></div>
      <button class="hamburger" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <div data-component="breadcrumb" class="breadcrumb-bar"
       style="height: var(--breadcrumb-height); display: flex; align-items: center; box-sizing: border-box;"></div>

  <main>
    <!-- PART 1: TITLE, PARAGRAPH, INSIGHTS GRID -->
    <section class="section">
      <div class="container">
        <h1 class="heading-large">Teaching</h1>
        <p class="paragraph">
          I am passionate about equipping healthcare professionals with the knowledge and skills
          they need to deliver evidence‑based, compassionate care. My teaching spans undergraduate
          and postgraduate levels, blending theory with hands‑on clinical application.
        </p>

        <!-- Grid of teaching insights (editable array) -->
        <div id="insights-grid" class="grid-data-analysis mt-lg" style="--da-grid-columns: 3;">
          <!-- Rendered by JavaScript -->
        </div>
      </div>
    </section>

    <!-- THIN GOLD SEPARATOR -->
    <div class="container">
      <hr style="border: none; border-top: 3px solid var(--color-gold); margin: 0;">
    </div>

    <!-- PART 2: FEATURE BUTTONS (3 stacked, centred) -->
    <section class="section" style="padding-bottom: 0;">
      <div class="container">
        <div id="feature-buttons-container" class="feature-buttons-container">
          <!-- Rendered by JavaScript -->
        </div>
      </div>
    </section>

    <!-- PART 3: FEATURED CARDS (10 CARDS) -->
    <section class="section">
      <div class="container">
        <div id="analysis-cards-container" class="grid-2" style="gap: var(--space-lg);">
          <!-- Rendered by JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <footer data-component="footer"></footer>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/breadcrumbs.js"></script>
  <script src="assets/js/footer.js"></script>

  <script>
    (function() {
      'use strict';

      // ------------------------------------------------------------------
      // A. INSIGHTS GRID (teaching themed)
      // ------------------------------------------------------------------
      const insightsList = [
        'Student‑Centred Learning Approaches',
        'Clinical Skills Development',
        'Evidence‑Based Practice Training',
        'Curriculum Design & Evaluation',
        'Mentorship & Supervision',
        'Assessment & Feedback Strategies'
      ];

      function renderInsightsGrid() {
        const container = document.getElementById('insights-grid');
        if (!container) return;
        container.innerHTML = '';

        insightsList.forEach(text => {
          const item = document.createElement('div');
          item.style.display = 'flex';
          item.style.alignItems = 'baseline';
          item.style.gap = 'var(--space-xs)';

          const symbol = document.createElement('span');
          symbol.textContent = '|';
          symbol.style.color = 'var(--color-gold)';
          symbol.style.fontWeight = 'bold';
          symbol.style.fontSize = '1.2rem';

          const sentence = document.createElement('span');
          sentence.textContent = text;
          sentence.style.color = 'var(--color-text-main)';

          item.appendChild(symbol);
          item.appendChild(sentence);
          container.appendChild(item);
        });
      }

      // ------------------------------------------------------------------
      // B. FEATURE BUTTONS
      // ------------------------------------------------------------------
      const featureButtonsData = [
        {
          icon: 'fas fa-newspaper',
          title: 'Read my insights about exceptional research',
          description: '',
          link: 'blog/blog-15.html'
        },
        {
          icon: 'fas fa-folder-open',
          title: 'Explore my teaching portfolio',
          description: '',
          link: 'teaching-portfolio.html'   // ← linked to teaching portfolio
        },
        {
          icon: 'fas fa-image',
          title: 'Infographic summary',
          description: '',
          link: 'assets/doc/temp.pdf'
        }
      ];

      function renderFeatureButtons() {
        const container = document.getElementById('feature-buttons-container');
        if (!container) return;
        container.innerHTML = '';

        featureButtonsData.forEach(btn => {
          const a = document.createElement('a');
          a.href = btn.link;
          a.className = 'btn-feature';
          a.style.padding = 'var(--space-sm) var(--space-md)';

          const icon = document.createElement('i');
          icon.className = btn.icon + ' btn-feature-icon';
          icon.style.width = '40px';
          icon.style.height = '40px';
          icon.style.fontSize = '1.4rem';
          a.appendChild(icon);

          const textDiv = document.createElement('div');
          textDiv.className = 'btn-feature-text';

          const titleDiv = document.createElement('div');
          titleDiv.className = 'btn-feature-title';
          titleDiv.textContent = btn.title;
          textDiv.appendChild(titleDiv);

          if (btn.description && btn.description.trim() !== '') {
            const descDiv = document.createElement('div');
            descDiv.className = 'btn-feature-desc';
            descDiv.textContent = btn.description;
            textDiv.appendChild(descDiv);
          }
          a.appendChild(textDiv);

          const arrow = document.createElement('span');
          arrow.className = 'btn-feature-arrow';
          arrow.innerHTML = '&#x203A;';
          a.appendChild(arrow);

          container.appendChild(a);
        });
      }

      // ------------------------------------------------------------------
      // C. FEATURED CARDS (teaching themed)
      // ------------------------------------------------------------------
      const analysisCards = [
        { title: 'Clinical Teaching Techniques', img: 'assets/img/teaching-card-1.webp', desc: 'Best practices for bedside clinical instruction.', blog: 'blog/blog-21.html' },
        { title: 'Simulation‑Based Learning', img: 'assets/img/teaching-card-2.webp', desc: 'Using high‑fidelity simulation for skill mastery.', blog: 'blog/blog-22.html' },
        { title: 'Assessment Blueprinting', img: 'assets/img/teaching-card-3.webp', desc: 'Designing valid and reliable exam tools.', blog: 'blog/blog-23.html' },
        { title: 'Feedback Strategies', img: 'assets/img/teaching-card-4.webp', desc: 'Giving constructive feedback to learners.', blog: 'blog/blog-24.html' },
        { title: 'Interprofessional Education', img: 'assets/img/teaching-card-5.webp', desc: 'Collaborative learning across disciplines.', blog: 'blog/blog-25.html' },
        { title: 'Online Learning Tools', img: 'assets/img/teaching-card-6.webp', desc: 'Leveraging technology for remote education.', blog: 'blog/blog-26.html' },
        { title: 'Clinical Reasoning', img: 'assets/img/teaching-card-7.webp', desc: 'Teaching diagnostic and decision‑making skills.', blog: 'blog/blog-27.html' },
        { title: 'Mentorship Models', img: 'assets/img/teaching-card-8.webp', desc: 'Structured mentoring for career development.', blog: 'blog/blog-28.html' },
        { title: 'Curriculum Mapping', img: 'assets/img/teaching-card-9.webp', desc: 'Aligning learning objectives with outcomes.', blog: 'blog/blog-29.html' },
        { title: 'Programme Evaluation', img: 'assets/img/teaching-card-10.webp', desc: 'Quality improvement in educational programmes.', blog: 'blog/blog-30.html' }
      ];

      function renderAnalysisCards() {
        const container = document.getElementById('analysis-cards-container');
        if (!container) return;
        container.innerHTML = '';

        analysisCards.forEach(card => {
          const cardLink = document.createElement('a');
          cardLink.href = card.blog;
          cardLink.className = 'card card-lift';
          cardLink.style.textDecoration = 'none';
          cardLink.style.color = 'inherit';
          cardLink.style.display = 'block';

          const img = document.createElement('img');
          img.src = card.img;
          img.alt = card.title;
          img.style.cssText = 'width:100%; height:200px; object-fit:cover; display:block;';
          img.setAttribute('loading', 'lazy');
          img.addEventListener('error', function() {
            const placeholder = document.createElement('div');
            placeholder.style.cssText = 'width:100%; height:200px; background-color:#ccc; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem;';
            placeholder.textContent = card.img.split('/').pop();
            cardLink.replaceChild(placeholder, img);
          });
          cardLink.appendChild(img);

          const content = document.createElement('div');
          content.className = 'card-content';

          const titleEl = document.createElement('h3');
          titleEl.className = 'card-title';
          titleEl.textContent = card.title;
          content.appendChild(titleEl);

          const descEl = document.createElement('p');
          descEl.className = 'card-description';
          descEl.textContent = card.desc;
          content.appendChild(descEl);

          const btnText = document.createElement('span');
          btnText.className = 'btn btn-text';
          btnText.innerHTML = '<i class="fas fa-newspaper mr-xs"></i> Read more →';
          content.appendChild(btnText);

          cardLink.appendChild(content);
          container.appendChild(cardLink);
        });
      }

      // ------------------------------------------------------------------
      // D. INITIALISATION
      // ------------------------------------------------------------------
      function initPageSpecific() {
        renderInsightsGrid();
        renderFeatureButtons();
        renderAnalysisCards();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPageSpecific);
      } else {
        initPageSpecific();
      }
    })();
  </script>
</body>
</html>
