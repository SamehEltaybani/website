<!--
============================================================================
RESEARCH.HTML - DR. SAMEH ELTAYBANI - RESEARCH PAGE
============================================================================
Page‑specific content:
  1. Title, paragraph, and external resource buttons (array‑driven)
  2. Three prominent buttons block (equal height, side‑by‑side on all screens)
  3. Featured cards group (10 cards, array‑driven)
  4. Repeated three prominent buttons block (second instance)
============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== BASE PATH (for GitHub Pages project site) ===== -->
  <base href="/website/">
  <!-- ===== SITE BASE PATH (used by utils.js to resolve absolute URLs) ===== -->
  <meta name="site-base-path" content="/website/">

  <!-- PAGE-SPECIFIC -->
  <title>Dr. Sameh Eltaybani - Research</title>
  <meta name="description" content="Explore Dr. Sameh Eltaybani's research interests, key projects, and external resources. Discover evidence‑based healthcare research.">
  <!-- Open Graph -->
  <meta property="og:title" content="Dr. Sameh Eltaybani - Research">
  <meta property="og:description" content="Explore Dr. Sameh Eltaybani's research interests, key projects, and external resources. Discover evidence‑based healthcare research.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="research.html">

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- MAIN CSS -->
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="research.html">
  <!-- ========== NAVIGATION BAR ========== -->
  <nav data-component="navigation" class="navbar">
    <div class="navbar-container">
      <div class="navbar-left"></div>
      <div class="navbar-right"></div>
      <button class="hamburger" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- ========== BREADCRUMB BAR ========== -->
  <div data-component="breadcrumb" class="breadcrumb-bar"
     style="height: var(--breadcrumb-height); display: flex; align-items: center; box-sizing: border-box;"></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main>
    <!-- PART 1: TITLE, PARAGRAPH, EXTERNAL BUTTONS -->
    <section class="section">
      <div class="container">
        <h1 class="heading-large">Research</h1>
        <p class="paragraph">
          My research focuses on gerontological nursing, long‑term care quality, and evidence‑based practice.
          I collaborate with international teams to improve outcomes for older adults and their caregivers.
        </p>
        <!-- External resource buttons (array‑driven, auto‑wrapping) -->
        <div id="external-buttons-container" class="mt-lg" style="display: flex; flex-wrap: wrap; gap: var(--space-sm);">
          <!-- Rendered by JavaScript -->
        </div>
      </div>
    </section>

    <!-- THIN BORDER SEPARATOR -->
    <div class="container">
  <hr style="border: none; border-top: 3px solid var(--color-gold); margin: 0;">
</div>

    <!-- PART 2: THREE PROMINENT BUTTONS BLOCK (always side‑by‑side) -->
    <section class="section">
  <div class="container" style="background-color: var(--color-bg-alt); padding: var(--space-lg); border-radius: 12px;">

        <!-- Container forces two equal columns on ALL screen sizes -->
        <div id="three-buttons-block-1"
             style="display: flex; flex-direction: row; align-items: stretch; gap: var(--space-md); max-width: 800px; margin: 0 auto;">
          <!-- Left column (two stacked buttons) -->
          <!-- Right column (image+caption inside a single button) -->
        </div>
      </div>
    </section>

    <!-- PART 3: FEATURED CARDS GROUP (10 CARDS) -->
    <section class="section">
      <div class="container">
        <h2 class="heading-medium mb-lg">Featured Research Projects</h2>
        <div id="research-cards-container" class="grid-2" style="gap: var(--space-lg);">
          <!-- Rendered by JavaScript -->
        </div>
      </div>
    </section>

     <!-- THIN BORDER SEPARATOR -->
        <div class="container">
      <hr style="border: none; border-top: 3px solid var(--color-gold); margin: 0;">
    </div>
    

    <!-- PART 4: REPEATED THREE PROMINENT BUTTONS BLOCK (second instance) -->
    <section class="section">
  <div class="container" style="background-color: var(--color-bg-alt); padding: var(--space-lg); border-radius: 12px;">
        <div id="three-buttons-block-2"
             style="display: flex; flex-direction: row; align-items: stretch; gap: var(--space-md); max-width: 800px; margin: 0 auto;">
          <!-- Rendered by JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer data-component="footer"></footer>

  <!-- ========== SCRIPTS (EXACT ORDER - DO NOT CHANGE) ========== -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/breadcrumbs.js"></script>
  <script src="assets/js/footer.js"></script>

  <!-- ========== PAGE-SPECIFIC SCRIPTS ========== -->
  <script>
    (function() {
      'use strict';

      // ------------------------------------------------------------------
      // A. EXTERNAL RESOURCE BUTTONS
      // ------------------------------------------------------------------
      const externalButtons = [
        { label: 'Google Scholar', url: 'https://scholar.google.com/citations?user=YOUR_ID' },
        { label: 'ResearchGate', url: 'https://www.researchgate.net/profile/Sameh_Eltaybani' },
        { label: 'ORCID', url: 'https://orcid.org/0000-0002-1234-5678' }
      ];

      function renderExternalButtons() {
        const container = document.getElementById('external-buttons-container');
        if (!container) return;
        container.innerHTML = '';
        externalButtons.forEach(btn => {
          const a = document.createElement('a');
          a.href = btn.url;
          a.className = 'btn btn-primary';
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = btn.label;
          container.appendChild(a);
        });
      }

      // ------------------------------------------------------------------
      // B. THREE PROMINENT BUTTONS BLOCK (reusable renderer)
      // ------------------------------------------------------------------
      const threeButtonsData = {
        upperLeft: {
          label: 'Read my insights on exceptional research ❯ ❯',
          href: 'blog/blog-15.html'
        },
        lowerLeft: {
          label: 'View My Research Portfolio',
          href: 'research-portfolio.html'
        },
        rightImage: {
          src: 'assets/img/temp-1.webp',
          alt: 'Research highlight',
          caption: 'Infographic summary ❯ ❯',
          href: 'assets/doc/temp.pdf'
        }
      };

      /**
       * Renders the three‑button block with equal‑height right button.
       * The container must be a two‑column grid (display: grid; grid-template-columns: 1fr 1fr).
       */
      function renderThreeButtonsBlock(container, data) {
        if (!container) return;
        container.innerHTML = '';

        // ---- LEFT COLUMN (two stacked buttons) ----
        const leftCol = document.createElement('div');
        leftCol.style.display = 'flex';
        leftCol.style.flexDirection = 'column';
        leftCol.style.gap = 'var(--space-md)';   // same as grid gap for visual consistency
        leftCol.style.flex = '2';
        leftCol.style.maxWidth = '500px'; 
        leftCol.style.height = '100%';

        // Upper left button
        const upperBtn = document.createElement('a');
        upperBtn.href = data.upperLeft.href;
        upperBtn.className = 'btn btn-primary';
        upperBtn.textContent = data.upperLeft.label;
        upperBtn.style.width = '100%';
        leftCol.appendChild(upperBtn);

        // Lower left button
        const lowerBtn = document.createElement('a');
        lowerBtn.href = data.lowerLeft.href;
        lowerBtn.className = 'btn btn-secondary';
        lowerBtn.textContent = data.lowerLeft.label;
        lowerBtn.style.width = '100%';
        leftCol.appendChild(lowerBtn);

        // ---- RIGHT COLUMN (single clickable button containing image + caption) ----
        const rightLink = document.createElement('a');
        rightLink.href = data.rightImage.href;
        rightLink.style.display = 'flex';
        rightLink.style.flexDirection = 'column';
        rightLink.style.alignItems = 'center';
        rightLink.style.justifyContent = 'space-between';  // push caption to bottom if needed
        rightLink.style.textDecoration = 'none';
        rightLink.style.color = 'inherit';
        rightLink.style.borderRadius = '8px';
        rightLink.style.overflow = 'hidden';
        rightLink.style.backgroundColor = 'var(--color-bg-alt)';
        rightLink.style.border = '1px solid var(--color-border)';
        rightLink.style.transition = 'var(--transition-base)';
        rightLink.style.flex = '1';
        rightLink.style.minWidth = '200px'; 

        // Image
        const img = document.createElement('img');
        img.src = data.rightImage.src;
        img.alt = data.rightImage.alt;
        img.style.width = '100%';
        img.style.flex = '1 1 auto';        // let image take available space
        img.style.objectFit = 'contain';
        img.setAttribute('loading', 'lazy');
        img.addEventListener('error', function() {
          const placeholder = document.createElement('div');
          placeholder.style.cssText = `
            width: 100%;
            height: 150px;
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            padding: 1rem;
          `;
          placeholder.textContent = data.rightImage.src.split('/').pop();
          rightLink.replaceChild(placeholder, img);
        });
        rightLink.appendChild(img);

        // Caption below the image (still inside the button)
        const caption = document.createElement('span');
        caption.textContent = data.rightImage.caption;
        caption.style.display = 'block';
        caption.style.padding = 'var(--space-sm)';
        caption.style.fontSize = 'var(--font-size-sm)';
        caption.style.color = 'var(--color-text-muted)';
        caption.style.textAlign = 'center';
        caption.style.backgroundColor = 'rgba(255,255,255,0.8)';
        rightLink.appendChild(caption);

        // Assemble block
        container.appendChild(leftCol);
        container.appendChild(rightLink);
      }

      // ------------------------------------------------------------------
      // C. FEATURED RESEARCH CARDS
      // ------------------------------------------------------------------
      const researchCards = [
        { title: 'Care Quality in Nursing Homes', img: 'assets/img/research-card-1.webp', desc: 'Investigating staff‑to‑resident ratios and quality outcomes.', blog: 'blog/blog-21.html' },
        { title: 'Geriatric Syndromes', img: 'assets/img/research-card-2.webp', desc: 'Understanding frailty and falls prevention in acute care.', blog: 'blog/blog-22.html' },
        { title: 'Evidence‑Based Nursing', img: 'assets/img/research-card-3.webp', desc: 'Bridging research findings with bedside practice.', blog: 'blog/blog-23.html' },
        { title: 'Palliative Care Models', img: 'assets/img/research-card-4.webp', desc: 'Comparing integrated palliative care approaches.', blog: 'blog/blog-24.html' },
        { title: 'Long‑Term Care Workforce', img: 'assets/img/research-card-5.webp', desc: 'Retention and burnout among geriatric nurses.', blog: 'blog/blog-25.html' },
        { title: 'Dementia Care Pathways', img: 'assets/img/research-card-6.webp', desc: 'Mapping optimal care trajectories for dementia patients.', blog: 'blog/blog-26.html' },
        { title: 'Elder Abuse Detection', img: 'assets/img/research-card-7.webp', desc: 'Developing screening tools for clinical settings.', blog: 'blog/blog-27.html' },
        { title: 'Nutrition in Older Adults', img: 'assets/img/research-card-8.webp', desc: 'Interventions to prevent malnutrition in hospitals.', blog: 'blog/blog-28.html' },
        { title: 'Interdisciplinary Rounds', img: 'assets/img/research-card-9.webp', desc: 'Impact on patient outcomes and staff satisfaction.', blog: 'blog/blog-29.html' },
        { title: 'Technology in Geriatrics', img: 'assets/img/research-card-10.webp', desc: 'Adoption of telehealth and monitoring tools.', blog: 'blog/blog-30.html' }
      ];

      function renderResearchCards() {
        const container = document.getElementById('research-cards-container');
        if (!container) return;
        container.innerHTML = '';

        researchCards.forEach(card => {
          const cardDiv = document.createElement('div');
          cardDiv.className = 'card card-lift';

          const img = document.createElement('img');
          img.src = card.img;
          img.alt = card.title;
          img.style.cssText = 'width:100%; height:200px; object-fit:cover;';
          img.setAttribute('loading', 'lazy');
          img.addEventListener('error', function() {
            const placeholder = document.createElement('div');
            placeholder.style.cssText = `
              width: 100%;
              height: 200px;
              background-color: #ccc;
              display: flex;
              align-items: center;
              justify-content: center;
              color: white;
              font-size: 1rem;
              padding: 1rem;
            `;
            placeholder.textContent = card.img.split('/').pop();
            cardDiv.replaceChild(placeholder, img);
          });
          cardDiv.appendChild(img);

          const content = document.createElement('div');
          content.className = 'card-content';

          const titleEl = document.createElement('h3');
          titleEl.className = 'card-title';
          titleEl.textContent = card.title;
          content.appendChild(titleEl);

          const descEl = document.createElement('p');
          descEl.className = 'card-description';
          descEl.textContent = card.desc;
          content.appendChild(descEl);

          const linkEl = document.createElement('a');
          linkEl.href = card.blog;
          linkEl.className = 'btn btn-text';
          linkEl.textContent = 'Read more →';
          content.appendChild(linkEl);

          cardDiv.appendChild(content);
          container.appendChild(cardDiv);
        });
      }

      // ------------------------------------------------------------------
      // D. INITIALISATION
      // ------------------------------------------------------------------
      function initPageSpecific() {
        renderExternalButtons();

        const block1 = document.getElementById('three-buttons-block-1');
        renderThreeButtonsBlock(block1, threeButtonsData);

        renderResearchCards();

        const block2 = document.getElementById('three-buttons-block-2');
        renderThreeButtonsBlock(block2, threeButtonsData);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPageSpecific);
      } else {
        initPageSpecific();
      }
    })();
  </script>
</body>
</html>
